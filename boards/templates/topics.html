<!DOCTYPE html>
<html>
<head>
    <title>{{ board.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">My Forum</a>
    {% if user.is_authenticated %}
        <span class="text-white">Hi, {{ user.username }} |
        <a href="{% url 'logout' %}" class="text-white">Logout</a></span>
    {% else %}
        <a href="{% url 'login' %}" class="text-white">Login</a>
    {% endif %}
  </div>
</nav>

<div class="container">
    <h2>{{ board.name }}</h2>
    <p>{{ board.description }}</p>

    {% if user.is_authenticated %}
        <a href="{% url 'new_topic' board.pk %}" class="btn btn-primary mb-3">
            New Topic
        </a>
    {% endif %}

    <ul class="list-group">
        {% for topic in board.topics.all %}
            <li class="list-group-item">
                <a href="{% url 'topic_posts' board.pk topic.pk %}">
                    {{ topic.subject }}
                </a>
            </li>
        {% endfor %}
    </ul>

    <br>
    <a href="/" class="btn btn-secondary">Back</a>
</div>

</body>
</html>
