<!DOCTYPE html>
<html>
<head>
    <title>Boards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">My Forum</a>
    {% if user.is_authenticated %}
        <span class="text-white">Hi, {{ user.username }} |
        <a href="{% url 'logout' %}" class="text-white">Logout</a></span>
    {% else %}
        <a href="{% url 'login' %}" class="text-white">Login</a>
    {% endif %}
  </div>
</nav>

<div class="container">
    <h1 class="mb-4">Discussion Boards</h1>

    <div class="list-group">
        {% for board in boards %}
            <a href="{% url 'board_topics' board.pk %}" 
               class="list-group-item list-group-item-action">
                <strong>{{ board.name }}</strong><br>
                <small>{{ board.description }}</small>
            </a>
        {% endfor %}
    </div>
</div>

</body>
</html>
