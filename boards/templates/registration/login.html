<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
  {% if user.is_authenticated %}
    Welcome, {{ user.username }} |
    <a href="{% url 'logout' %}">Logout</a>
{% else %}
    <a href="{% url 'login' %}">Login</a>
{% endif %}

<hr>

<h2>Login</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
</form>

</body>
</html>
